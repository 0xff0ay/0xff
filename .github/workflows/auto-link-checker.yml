name: Auto Documentation Link Checker

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Link Checker
        run: npm install -g broken-link-checker

      - name: Check Links
        continue-on-error: true
        run: |
          blc --filter --follow --get --recursive \
            --exclude "*.github.com" \
            --exclude "localhost" \
            --exclude "node_modules" \
            ./content --verbose >> link_check_report.txt || true

      - name: Create Issue for Broken Links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const report = await fs.readFileSync('link_check_report.txt', 'utf8');
            if (report.includes('BROKEN')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔗 Broken Links Detected',
                body: `Link check report:\n\`\`\`\n${report}\n\`\`\``,
                labels: ['bug', 'documentation']
              })
            }

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: link_check_report.txt