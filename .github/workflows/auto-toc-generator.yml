name: Auto Table of Contents Generator

on:
  push:
    branches: [main]
    paths:
      - 'content/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-toc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TOC Generator
        run: npm install -g markdown-toc

      - name: Generate TOC for Each Section
        run: |
          for file in content/**/*.md; do
            echo "Processing: $file"
            markdown-toc -i "$file" || true
          done

      - name: Commit TOC Updates
        run: |
          git config --local user.email "toc[bot]@github.com"
          git config --local user.name "TOC Generator Bot"
          git add -A
          git diff --staged --quiet || git commit -m "docs: auto-generate table of contents"
          git diff --staged --quiet && echo "No changes" || git push

      - name: Create Summary
        run: |
          echo "# TOC Update Summary" > toc_summary.md
          echo "Generated on: $(date)" >> toc_summary.md
          echo "" >> toc_summary.md
          echo "## Updated Files" >> toc_summary.md
          git diff --staged --name-only >> toc_summary.md

      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: toc-summary
          path: toc_summary.md