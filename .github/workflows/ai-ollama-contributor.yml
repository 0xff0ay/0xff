name: Ollama Local AI Contributor

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: true
        default: 'Security documentation review'
      model:
        description: 'Ollama Model'
        required: false
        default: 'llama3'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ollama-contribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama pull ${{ github.event.inputs.model || 'llama3' }}

      - name: Run Ollama Task
        run: |
          ollama run ${{ github.event.inputs.model || 'llama3' }} "
          You are an AI contributor for a penetration testing documentation repo.
          Task: ${{ github.event.inputs.task }}
          Make useful contributions, updates, and improvements.
          " >> ollama_response.md

      - name: Commit Changes
        if: success()
        run: |
          git config --local user.email "ai[bot]@github.com"
          git config --local user.name "Ollama Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Ollama: automated contribution"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Ollama: automated contribution'
          branch: ollama-bot/contributions
          delete-branch: true
          title: '🤖 Ollama Local AI Contribution'
          body: |
            Automated Ollama local AI contribution
            - Task: ${{ github.event.inputs.task }}
            - Model: ${{ github.event.inputs.model || 'llama3' }}