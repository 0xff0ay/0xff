name: "Bot: Weekly Stats Bot"

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Weekly Stats
        run: |
          echo "# Weekly Contribution Stats" > WEEKLY_STATS.md
          echo "Updated: $(date)" >> WEEKLY_STATS.md
          echo "" >> WEEKLY_STATS.md

          # Count commits this week
          COMMITS=$(git log --since="7 days ago" --oneline | wc -l)
          echo "## This Week" >> WEEKLY_STATS.md
          echo "- Commits: $COMMITS" >> WEEKLY_STATS.md

          # Count new files
          NEW_FILES=$(git log --since="7 days ago" --name-only --pretty=format: | grep -c "\.md$" || echo "0")
          echo "- New markdown files: $NEW_FILES" >> WEEKLY_STATS.md

          # Total content
          TOTAL_MD=$(find content -name "*.md" 2>/dev/null | wc -l)
          echo "" >> WEEKLY_STATS.md
          echo "## Total Content" >> WEEKLY_STATS.md
          echo "- Total .md files: $TOTAL_MD" >> WEEKLY_STATS.md

          echo "" >> WEEKLY_STATS.md
          echo "---" >> WEEKLY_STATS.md
          echo "*Generated by Weekly Stats Bot 📊*"

          git config --local user.email "statsbot@local"
          git config --local user.name "Weekly Stats Bot 📊"
          git add -A
          git commit -m "📊 Weekly Stats Bot: Update stats" || true
          git push

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "📊 Weekly stats update"
          branch: stats-bot/weekly
          delete-branch: true
          title: "📊 Weekly Statistics Update"
          body: |
            ## Free Bot - No API Key Required
            Weekly automated stats update.
          token: ${{ secrets.GITHUB_TOKEN }}